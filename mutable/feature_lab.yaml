          pair_beta_drift_24h: diff(pair_beta_72h,24)
          pair_beta_drift_z_168h: rolling_zscore(pair_beta_drift_24h,168)
          pair_kalman_beta: kalman_beta(log(asset_1_price),log(asset_2_price))
