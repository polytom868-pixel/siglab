common_perp_cross_sectional_raw_series: &perp_cross_sectional_raw_series
  [
    price,
    funding,
    market_price_mean,
    market_funding_mean,
    market_funding_dispersion,
    market_breadth_24h,
    market_co_movement_72h,
    market_realized_vol_168h,
  ]

common_perp_cross_sectional_aliases: &perp_cross_sectional_aliases
  price_return_24h: pct_change(price,24)
  price_return_72h: pct_change(price,72)
  price_return_168h: pct_change(price,168)
  trend_strength_72h: div(pct_change(price,72),rolling_std(pct_change(price,1),168))
  realized_vol_168h: rolling_std(pct_change(price,1),168)
  ema_gap_12_26: div(sub(ema(price,12),ema(price,26)),ema(price,26))
  macd_line_12_26: sub(ema(price,12),ema(price,26))
  macd_hist_12_26_9: sub(sub(ema(price,12),ema(price,26)),ema(sub(ema(price,12),ema(price,26)),9))
  bollinger_z_20: div(sub(price,rolling_mean(price,20)),rolling_std(price,20))
  bollinger_width_20: div(mul(2.0,rolling_std(price,20)),rolling_mean(price,20))
  rsi_14: rsi(price,14)
  rsi_centered_14: div(sub(rsi(price,14),50.0),50.0)
  donchian_width_20: div(sub(rolling_max(price,20),rolling_min(price,20)),price)
  donchian_position_20: sub(mul(2.0,div(sub(price,rolling_min(price,20)),sub(rolling_max(price,20),rolling_min(price,20)))),1.0)
  funding_24h_mean: rolling_mean(funding,24)
  funding_72h_mean: rolling_mean(funding,72)
  funding_168h_mean: rolling_mean(funding,168)
  funding_accel_24h: diff(rolling_mean(funding,24),24)
  funding_flip_prob_14d: sign_flip_prob(funding,336)
  funding_carry_to_vol: div(rolling_mean(funding,72),rolling_std(pct_change(price,1),168))
  funding_z_168h: rolling_zscore(rolling_mean(funding,72),168)
  price_return_vol_adj_24h: div(price_return_24h,clip(realized_vol_168h,0.01,10.0))
  market_trend_24h: pct_change(market_price_mean,24)
  market_trend_72h: pct_change(market_price_mean,72)
  market_volatility_168h: market_realized_vol_168h
  funding_level_72h: rolling_mean(market_funding_mean,72)
  funding_level_168h: rolling_mean(market_funding_mean,168)
  funding_dispersion_72h: rolling_mean(market_funding_dispersion,72)
  market_carry_z_72h: div(funding_level_72h,clip(funding_dispersion_72h,0.000001,1.0))
  market_carry_z_168h: div(funding_level_168h,clip(funding_dispersion_72h,0.000001,1.0))
  breadth_24h: market_breadth_24h
  co_movement_72h: market_co_movement_72h
  relative_momentum_24h: sub(price_return_24h,market_trend_24h)
  relative_momentum_72h: sub(price_return_72h,market_trend_72h)
  breadth_adjusted_relative_momentum_24h: mul(relative_momentum_24h,clip(breadth_24h,0.1,1.0))
  relative_carry_72h: sub(funding_72h_mean,funding_level_72h)
  relative_carry_168h: sub(funding_168h_mean,funding_level_168h)
  relative_carry_z_72h: div(relative_carry_72h,clip(funding_dispersion_72h,0.000001,1.0))
  relative_carry_z_168h: div(relative_carry_168h,clip(funding_dispersion_72h,0.000001,1.0))
  carry_term_structure_24_168: sub(funding_24h_mean,funding_168h_mean)
  carry_term_structure_72_168: sub(funding_72h_mean,funding_168h_mean)
  carry_decay_ratio_24_168: div(carry_term_structure_24_168,clip(abs(funding_168h_mean),0.000001,1.0))

tracks:
  directional_perps:
    families:
      perp_multi_asset_decision:
        raw_series: *perp_cross_sectional_raw_series
        aliases:
          <<: *perp_cross_sectional_aliases
      perp_basket_neutral_unlevered:
        raw_series: *perp_cross_sectional_raw_series
        aliases:
          <<: *perp_cross_sectional_aliases
      perp_basket_neutral_levered:
        raw_series: *perp_cross_sectional_raw_series
        aliases:
          <<: *perp_cross_sectional_aliases
      perp_multi_asset_carry:
