name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poetry
        run: pipx install poetry

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Check dashboard JavaScript syntax
        run: |
          node --check wayfinder_autolab/dashboard/static/common.js
          node --check wayfinder_autolab/dashboard/static/home.js
          node --check wayfinder_autolab/dashboard/static/app.js
          node --check wayfinder_autolab/dashboard/static/experiment.js

      - name: Run test suite
        run: poetry run pytest --maxfail=1 -q
