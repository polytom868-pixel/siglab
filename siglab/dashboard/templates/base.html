<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}SoSoValue SigLab{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>
    <link rel="dns-prefetch" href="/api">
    <link rel="stylesheet" href="/styles.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f9ea;</text></svg>" />
    {% block head_extra %}{% endblock %}
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <noscript>
      <div style="padding: 40px; text-align: center; background: #080c0a; color: #e2ebe5; font-family: sans-serif;">
        <p>SigLab requires JavaScript to render the dashboard.</p>
        <p><a href="/api/runs" style="color: #4ade80;">View raw API data</a></p>
      </div>
    </noscript>

    <nav class="navbar" role="navigation">
      <a class="navbar-brand" href="/">
        <img src="/logo.svg" class="navbar-logo-svg" alt="SigLab" loading="lazy" />
        <span class="navbar-title">SoSoValue</span>
      </a>
      <button class="navbar-toggle" id="navbarToggle" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
      <div class="navbar-nav">
        <a class="navbar-link {% block nav_dashboard_active %}{% endblock %}" aria-label="View runs dashboard" href="/">Runs</a>
        {% block nav_extra_links %}{% endblock %}
        <a class="navbar-link {% block nav_ops_active %}{% endblock %}" aria-label="View operations board" href="/ops">Ops</a>
      </div>
      <div class="navbar-status">
        <span class="status-dot"></span>
        <span class="status-label">SigLab</span>
        <button id="themeToggle" class="theme-toggle" aria-label="Switch to light mode" title="Switch theme">🌙</button>
      </div>
    </nav>

    <div class="page-shell" id="main-content" role="main">
      {% block content %}{% endblock %}
    </div>

    <div id="errorToast" class="toast-error hidden" role="alert" aria-live="assertive"></div>

    <!-- Alpine.js for client state -->
    <script src="https://unpkg.com/alpinejs@3.13.3" defer></script>

    <!-- SigLab JS modules -->
    <script src="/constants.js"></script>
    <script src="/common.js"></script>
    <script src="/chart-engine.js"></script>
    {% block scripts_extra %}{% endblock %}

    <script>
      document.addEventListener('alpine:init', () => {
        Alpine.store('filter', {
          track: 'all',
          family: 'all',
          metric: 'aggregate_score',
        });
        Alpine.store('selection', {
          selectedHash: null,
          selectedRunId: null,
        });
        Alpine.store('displayCapital', {
          usd: 100000,
        });
        Alpine.store('refresh', {
          lastUpdated: null,
          isRefreshing: false,
        });
      });
    </script>
  </body>
</html>
