track: trend_signals
family: perp_multi_asset_carry
hypothesis: Rank perps with a carry-led but price-aware cross-sectional score, short
  the crowded expensive carry names, and buy the strongest cheap-carry names.
neutrality_basis: none
features:
- funding_168h_mean
- funding_72h_mean
- funding_carry_to_vol
- realized_vol_168h
- relative_momentum_24h
- trend_strength_72h
universe:
  basis_groups:
  - BTC
  - ETH
  - SOL
  - HYPE
  chains:
  - hyperevm
  max_symbols: 4
  lookback_days: 365
  interval: 1h
  min_liquidity_usd: 250000.0
  min_volume_usd_24h: 25000.0
  min_days_to_expiry: 7
  max_days_to_expiry: 180
risk:
  max_asset_weight: 0.35
  max_chain_weight: 1.0
  rebalance_threshold: 0.03
  roll_days_before_expiry: 5
  max_leverage: 1.5
regime_gates: {}
params:
  gross_target: 1.0
  long_count: 2
  long_enabled: true
  min_abs_score: 0.12
  short_count: 2
  short_enabled: true
