track: trend_signals
family: perp_multi_asset_carry
hypothesis: 'External-agent benchmark seed: carry strength must beat funding-only
  noise while preserving market-neutral risk.'
neutrality_basis: market
features:
- funding_72h_mean
- funding_carry_to_vol
universe:
  basis_groups:
  - BTC
  - ETH
  - SOL
  - HYPE
  chains: []
  max_symbols: 4
  lookback_days: 365
  interval: 1h
  min_liquidity_usd: 250000.0
  min_volume_usd_24h: 25000.0
  min_days_to_expiry: 7
  max_days_to_expiry: 180
risk:
  max_asset_weight: 0.35
  max_chain_weight: 1.0
  rebalance_threshold: 0.03
  roll_days_before_expiry: 5
  max_leverage: 1.0
regime_gates: {}
params:
  gross_target: 1.0
  long_count: 2
  short_count: 2
