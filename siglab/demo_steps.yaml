steps:
  - name: "Build SoSoValue Evidence"
    command: "python3 -m siglab.cli evidence-build --currency BTC --json"
    expected_output: "evidence record count > 0"
    evidence_path: "runs/evidence/live_sosovalue_probe_btc_pages.jsonl"
  - name: "Probe SoDEX WebSocket"
    command: "python3 -m siglab.cli sodex-ws-probe --channel allBookTicker --timeout-seconds 12 --json"
    expected_output: "WebSocket connected, records collected"
    evidence_path: "runs/evidence/sodex_ws_evidence.jsonl"
  - name: "Generate Evidence Graph"
    command: "python3 -m siglab.cli evidence-map --json"
    expected_output: "evidence graph HTML generated"
    evidence_path: "runs/evidence/evidence_graph.html"
  - name: "Generate Market Report"
    command: "python3 -m siglab.cli market-report --entity BTC --json"
    expected_output: "entity=BTC status=READY_FOR_OPERATOR_REVIEW"
    evidence_path: "runs/market_report_latest.json"
  - name: "Check Live Boundaries"
    command: "python3 -m siglab.cli sodex-preflight --json"
    expected_output: "live_write_allowed: true/false (honest)"
    evidence_path: "runs/sodex_preflight_latest.json"
  - name: "Generate Telemetry Report"
    command: "python3 -m siglab.cli telemetry-report --track trend_signals --json"
    expected_output: "telemetry metrics collected"
    evidence_path: "runs/latest_telemetry_report.json"
  - name: "Index Demo Artifacts"
    command: "python3 -m siglab.cli demo manifest --json"
    expected_output: "artifact_count > 0"
    evidence_path: "runs/demo_manifest_latest.json"
  - name: "Research Loop (deterministic)"
    command: "python3 -m siglab.cli run --track trend_signals --skip-llm --iterations 1 --json"
    expected_output: "run completed, aggregate_score computed"
    evidence_path: "runs/trend_signals/"
  - name: "Run Validation Profile"
    command: "python3 -m siglab.cli profile --strict --json"
    expected_output: "zero findings"
    evidence_path: "runs/latest_profile_strict.json"
  - name: "Launch Dashboard"
    command: "python3 -m siglab.cli dashboard-start --port 8080"
    expected_output: "dashboard running, visit http://localhost:8080"
    evidence_path: "http://localhost:8080/ops"
