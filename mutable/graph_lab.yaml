specs:
  - track: trend_signals
    family: perp_multi_asset_decision
    hypothesis: Score each perp independently and allow every asset to be long, short, or flat based on its own signal strength.
    neutrality_basis: none
    features:
      - ema_gap_12_26
      - macd_hist_12_26_9
      - rsi_centered_14
      - donchian_position_20
      - price_return_72h
      - realized_vol_168h
    universe:
      basis_groups: [BTC, ETH, SOL, HYPE]
      chains: [hyperevm]
      max_symbols: 4
      lookback_days: 365
      interval: 1h
    risk:
      max_asset_weight: 0.3
      max_chain_weight: 1.0
      rebalance_threshold: 0.03
      roll_days_before_expiry: 5
      max_leverage: 2.0
    params:
      long_count: 4
      short_count: 2
      gross_target: 1.0
      min_abs_score: 0.2
      long_enabled: true
      short_enabled: true
  - track: trend_signals
    family: perp_pair_trade_unlevered
    hypothesis: Mean-revert the ETH/BTC perp spread using ratio dislocation, relative short-term reversal, and funding pressure normalized by volatility.
    neutrality_basis: none
    features:
      - neg(div(sub(price_ratio, rolling_mean(price_ratio,60)), clip(rolling_std(price_ratio,60),0.0001,10.0)))
      - neg(sub(pct_change(asset_1_price,24), pct_change(asset_2_price,24)))
      - neg(div(sub(funding_spread, rolling_mean(funding_spread,72)), clip(rolling_std(funding_spread,72),0.000001,1.0)))
      - neg(div(rolling_mean(funding_spread,72), clip(pair_realized_vol_168h,0.01,10.0)))
    universe:
      basis_groups: [ETH, BTC]
      chains: [hyperevm]
      max_symbols: 2
      lookback_days: 365
      interval: 1h
    risk:
      max_asset_weight: 0.5
      max_chain_weight: 1.0
      rebalance_threshold: 0.03
      roll_days_before_expiry: 5
      max_leverage: 1.0
    params:
      gross_target: 1.0
      max_gross_target: 1.0
      min_abs_score: 0.2
      signal_leverage_scale: 1.0
  - track: trend_signals
    family: perp_pair_trade_levered
    hypothesis: Trade the ETH/BTC perp spread with vol-normalized relative momentum when price leadership is confirmed by more favorable relative funding.
    neutrality_basis: none
    features:
      - sub(pct_change(asset_1_price,24), pct_change(asset_2_price,24))
      - div(sub(pct_change(asset_1_price,24), pct_change(asset_2_price,24)), clip(pair_realized_vol_168h,0.01,10.0))
      - sub(rolling_mean(asset_2_funding,72), rolling_mean(asset_1_funding,72))
      - mul(sub(pct_change(asset_1_price,24), pct_change(asset_2_price,24)), sub(rolling_mean(asset_2_funding,72), rolling_mean(asset_1_funding,72)))
    universe:
      basis_groups: [ETH, BTC]
      chains: [hyperevm]
      max_symbols: 2
      lookback_days: 365
      interval: 1h
    risk:
      max_asset_weight: 1.5
      max_chain_weight: 1.0
      rebalance_threshold: 0.03
      roll_days_before_expiry: 5
      max_leverage: 3.0
    params:
      gross_target: 1.0
      max_gross_target: 3.0
      min_abs_score: 0.15
      signal_leverage_scale: 0.75
  - track: trend_signals
    family: perp_basket_neutral_unlevered
    hypothesis: Trade a neutral perp basket by buying the most dislocated low-carry names and shorting the richest high-carry names.
    neutrality_basis: none
    features:
      - price_return_24h
      - ema_gap_12_26
      - rsi_centered_14
      - realized_vol_168h
      - funding_72h_mean
      - funding_carry_to_vol
    universe:
      basis_groups: [BTC, ETH, SOL, HYPE]
      chains: [hyperevm]
      max_symbols: 4
      lookback_days: 365
      interval: 1h
    risk:
      max_asset_weight: 0.3
      max_chain_weight: 1.0
      rebalance_threshold: 0.03
      roll_days_before_expiry: 5
      max_leverage: 1.0
    params:
      long_count: 2
      short_count: 2
      gross_target: 1.0
      min_abs_score: 0.18
  - track: trend_signals
    family: perp_basket_neutral_levered
    hypothesis: Run a higher-turnover neutral perp basket that leans into the strongest cross-sectional continuation while staying market neutral.
    neutrality_basis: none
    features:
      - price_return_24h
      - price_return_72h
      - ema_gap_12_26
      - macd_hist_12_26_9
      - realized_vol_168h
      - funding_carry_to_vol
    universe:
      basis_groups: [BTC, ETH, SOL, HYPE]
      chains: [hyperevm]
      max_symbols: 4
      lookback_days: 365
      interval: 1h
    risk:
      max_asset_weight: 0.5
      max_chain_weight: 1.0
      rebalance_threshold: 0.02
      roll_days_before_expiry: 5
      max_leverage: 2.0
    params:
      long_count: 2
      short_count: 2
      gross_target: 1.2
      min_abs_score: 0.14
  - track: trend_signals
    family: perp_multi_asset_carry
    hypothesis: Rank perps with a carry-led but price-aware cross-sectional score, short the crowded expensive carry names, and buy the strongest cheap-carry names.
    neutrality_basis: none
    features:
      - funding_72h_mean
      - funding_168h_mean
      - funding_carry_to_vol
      - relative_momentum_24h
      - trend_strength_72h
      - realized_vol_168h
    universe:
      basis_groups: [BTC, ETH, SOL, HYPE]
      chains: [hyperevm]
      max_symbols: 4
      lookback_days: 365
      interval: 1h
    risk:
      max_asset_weight: 0.35
      max_chain_weight: 1.0
      rebalance_threshold: 0.03
      roll_days_before_expiry: 5
      max_leverage: 1.5
    params:
      long_count: 2
      short_count: 2
      gross_target: 1.0
      min_abs_score: 0.12
  - track: yield_flows
    family: basis_spread
    hypothesis: Short perps with strong positive funding and hedge each short with a synthetic spot leg.
    neutrality_basis: underlying
    features:
      - funding_72h_mean
      - funding_168h_mean
      - funding_flip_prob_14d
      - realized_vol_168h
    universe:
      basis_groups: [BTC, ETH, SOL, HYPE]
      chains: [hyperevm]
      max_symbols: 6
      lookback_days: 90
      interval: 1h
    risk:
      max_asset_weight: 0.3
      max_chain_weight: 1.0
      rebalance_threshold: 0.02
      roll_days_before_expiry: 5
      max_leverage: 1.5
    params:
      selection_count: 2
      gross_target: 1.0
  - track: yield_flows
    family: stable_pt_ladder
    hypothesis: Rotate into stable PT markets with strong roll-down and a positive implied versus underlying APY spread.
    neutrality_basis: usd
    features:
      - pt_discount_to_par
      - implied_minus_underlying_apy
      - expiry_roll_down
      - tvl_momentum_30d
    universe:
      basis_groups: [USD]
      chains: [arbitrum, base, plasma]
      max_symbols: 5
      lookback_days: 120
      interval: 1d
      min_liquidity_usd: 250000
      min_volume_usd_24h: 25000
      min_days_to_expiry: 10
      max_days_to_expiry: 180
    risk:
      max_asset_weight: 0.4
      max_chain_weight: 1.0
      rebalance_threshold: 0.05
      roll_days_before_expiry: 7
      max_leverage: 1.0
    params:
      selection_count: 3
      gross_target: 0.9
  - track: yield_flows
    family: pt_yield_rotation
    hypothesis: Rotate between PT markets with attractive fixed carry and optional perp hedges against underlying beta.
    neutrality_basis: underlying
    features:
      - implied_minus_underlying_apy
      - implied_apy_level
      - underlying_apy_level
      - expiry_roll_down
      - tvl_momentum_30d
    universe:
      basis_groups: [BTC, ETH, SOL]
      chains: [arbitrum, base]
      max_symbols: 5
      lookback_days: 120
      interval: 1d
      min_liquidity_usd: 250000
      min_volume_usd_24h: 25000
      min_days_to_expiry: 10
      max_days_to_expiry: 180
    risk:
      max_asset_weight: 0.25
      max_chain_weight: 1.0
      rebalance_threshold: 0.05
      roll_days_before_expiry: 7
      max_leverage: 1.5
    params:
      selection_count: 2
      gross_target: 0.8
      hedge_mode: perp
      hedge_ratio: 0.75
  - track: yield_flows
    family: lending_carry_rotation
    hypothesis: Rotate between lending markets with strong observed carry and liquidity, optionally hedged with perps on the basis root.
    neutrality_basis: underlying
    features:
      - lending_carry_level
      - lending_reward_apr
      - lending_supply_tvl_momentum_168h
      - lending_carry_to_util
    universe:
      basis_groups: [ETH, BTC, SOL]
      chains: [arbitrum, base, unichain]
      max_symbols: 5
      lookback_days: 90
      interval: 1h
      min_liquidity_usd: 250000
      min_volume_usd_24h: 25000
      min_days_to_expiry: 7
      max_days_to_expiry: 180
    risk:
      max_asset_weight: 0.25
      max_chain_weight: 1.0
      rebalance_threshold: 0.04
      roll_days_before_expiry: 5
      max_leverage: 1.5
    params:
      selection_count: 2
      gross_target: 0.8
      hedge_mode: perp
      hedge_ratio: 0.75

