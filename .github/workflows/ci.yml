name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: |
          python -m pytest -q --tb=short --ignore=tests/e2e --ignore=tests/integration
        env:
          SOSOVALUE_API_KEY: ${{ secrets.SOSOVALUE_API_KEY || '' }}

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright
        working-directory: tests/e2e
        run: |
          npm install
          npx playwright install chromium

      - name: Start server
        run: |
          uvicorn siglab.dashboard.app:app --host 127.0.0.1 --port 8080 &
          sleep 5

      - name: Run E2E tests
        run: |
          python -m pytest tests/e2e/test_demo_flows.py -v --tb=short
        env:
          BASE_URL: http://127.0.0.1:8080

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
