          pair_residual_autocorr_24h: rolling_autocorr(pair_log_spread,1,24)
          pair_residual_autocorr_72h: rolling_autocorr(pair_log_spread,1,72)
          pair_residual_skew_72h: rolling_skew(pair_log_spread,72)
