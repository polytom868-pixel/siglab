          asset_2_return_6h: pct_change(asset_2_price,6)
          asset_2_return_24h: pct_change(asset_2_price,24)
          asset_2_return_72h: pct_change(asset_2_price,72)
          asset_1_vol_24h: rolling_std(pct_change(asset_1_price,1),24)
          asset_1_vol_72h: rolling_std(pct_change(asset_1_price,1),72)
          asset_2_vol_24h: rolling_std(pct_change(asset_2_price,1),24)
          asset_2_vol_72h: rolling_std(pct_change(asset_2_price,1),72)
          asset_1_ema_gap_12_26: div(sub(ema(asset_1_price,12),ema(asset_1_price,26)),ema(asset_1_price,26))
          asset_2_ema_gap_12_26: div(sub(ema(asset_2_price,12),ema(asset_2_price,26)),ema(asset_2_price,26))
          asset_1_ema_slope_24: pct_change(ema(asset_1_price,24),6)
          asset_2_ema_slope_24: pct_change(ema(asset_2_price,24),6)
