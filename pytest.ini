[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -n auto --dist=loadscope --max-worker-restart=0 --durations=10 --durations-min=0.5 --strict-markers --ignore=tests/e2e
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    network: marks tests that need network access
    memory_intensive: marks tests that use >500MB RAM
    integration: marks tests that make real API calls or run CLI subprocesses (run with -m integration)
    asyncio: marks async test cases
    tmux: marks tmux-based TUI tests that spawn terminal sessions (run with -m tmux)
filterwarnings =
    ignore::DeprecationWarning
    ignore::ResourceWarning
