name: Bug report
description: Report a reproducible problem in the harness, evaluator, dashboard, or live export flow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and why it matters.
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the exact command, page, or workflow that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include run session IDs, candidate hashes, benchmark deck names, logs, screenshots, or error text when relevant.
      placeholder: run_session_id, candidate_hash, error text, dashboard page, artifact ref...

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, Poetry version, and whether the issue involved real config/API credentials.
      placeholder: macOS 15, Python 3.12, Poetry 2.x, local config present...
