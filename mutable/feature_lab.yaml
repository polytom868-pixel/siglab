          asset_2_funding_72h_mean: rolling_mean(asset_2_funding,72)
          asset_1_funding_accel_24h: diff(rolling_mean(asset_1_funding,24),24)
          asset_2_funding_accel_24h: diff(rolling_mean(asset_2_funding,24),24)
          asset_1_trend_efficiency_72h: div(abs(diff(asset_1_price,72)),clip(rolling_sum(abs(diff(asset_1_price,1)),72),0.0001,1000000.0))
          asset_2_trend_efficiency_72h: div(abs(diff(asset_2_price,72)),clip(rolling_sum(abs(diff(asset_2_price,1)),72),0.0001,1000000.0))
          pair_ratio_return_24h: pct_change(price_ratio,24)
          pair_ratio_return_72h: pct_change(price_ratio,72)
          pair_ratio_return_168h: pct_change(price_ratio,168)
          pair_return_spread_6h: sub(asset_1_return_6h,asset_2_return_6h)
          pair_return_spread_24h: sub(asset_1_return_24h,asset_2_return_24h)
          pair_return_spread_72h: sub(asset_1_return_72h,asset_2_return_72h)
